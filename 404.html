<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada - IMPULSO IA</title>
  <meta name="description" content="Página no encontrada. Volvé a la página de inicio de IMPULSO IA para descubrir soluciones de automatización con IA para tu negocio.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1B3A6B;
      --primary-dark: #122850;
      --primary-light: #2A5298;
      --accent: #C9A84C;
      --accent-dark: #A8872E;
      --dark: #0A1628;
      --dark-2: #121F36;
      --gray: #5A6E8A;
      --gray-light: #8A9BB5;
      --light: #F5F7FA;
      --white: #FFFFFF;
      --gradient: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--dark);
      background: linear-gradient(180deg, #EEF1F6 0%, var(--white) 100%);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      width: 100%;
      padding: 16px 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    nav .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }

    .logo span {
      color: var(--dark);
    }

    /* MAIN CONTENT */
    .not-found {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    .not-found-card {
      text-align: center;
      max-width: 640px;
      background: var(--white);
      border-radius: 20px;
      padding: 60px 48px;
      box-shadow: 0 20px 60px rgba(27, 58, 107, 0.1);
    }

    .error-code {
      font-size: 120px;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      line-height: 1;
    }

    .not-found-card h1 {
      font-size: 32px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 12px;
    }

    .not-found-card p {
      font-size: 16px;
      color: var(--gray);
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .not-found-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--gradient);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(27, 58, 107, 0.3);
    }

    .btn-secondary {
      background: var(--light);
      color: var(--dark);
      border: 2px solid #E2E8F0;
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 640px) {
      .not-found-card {
        padding: 40px 24px;
      }

      .error-code {
        font-size: 80px;
      }

      .not-found-card h1 {
        font-size: 24px;
      }

      .not-found-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/impulso-ia-landing/" class="logo">IMPULSO <span>IA</span></a>
    </div>
  </nav>

  <main class="not-found">
    <div class="not-found-card">
      <div class="error-code">404</div>
      <h1>Página no encontrada</h1>
      <p>Lo sentimos, la página que buscás no existe. Pero no te preocupes, podemos ayudarte a encontrar lo que necesitas.</p>

      <div class="not-found-actions">
        <a href="/impulso-ia-landing/" class="btn btn-primary">
          ← Volver al inicio
        </a>
        <a href="/impulso-ia-landing/blog/" class="btn btn-secondary">
          📖 Ir al blog
        </a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 IMPULSO IA - Automatización con IA para PyMEs Argentinas</p>
  </footer>

</body>
</html>
